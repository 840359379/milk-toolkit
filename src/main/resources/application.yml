spring:
  datasource:
    url: jdbc:mysql://localhost:3306/base_auth?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.r2dbc.R2dbcAutoConfiguration
      - org.springframework.boot.autoconfigure.r2dbc.R2dbcTransactionManagerAutoConfiguration

  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 10MB          # 单个文件最大大小
      max-request-size: 100MB      # 整个请求最大大小
      enabled: true                 # 启用文件上传（默认就是true）

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml   # 注意正确写法：指定 XML 映射文件位置
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl  # 打印 SQL 日志（可选，方便调试）
  global-config:
    db-config:
      id-type: auto                 # 全局主键策略（如自增）

license:
  private-key: ""

file:
  upload-dir: ./uploads          # 文件上传存储目录
  access-url-prefix: /files/     # 文件访问URL前缀